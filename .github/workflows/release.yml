name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-macos-amd64:
    runs-on: macos-13   # x86_64 runner — CGO cross-compile not supported
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - name: Build macOS amd64
        run: go build -ldflags="-s -w" -o wgtray-darwin-amd64 .
      - uses: actions/upload-artifact@v4
        with:
          name: wgtray-darwin-amd64
          path: wgtray-darwin-amd64

  build-macos-arm64:
    runs-on: macos-latest   # arm64 runner
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - name: Build macOS arm64
        run: go build -ldflags="-s -w" -o wgtray-darwin-arm64 .
      - uses: actions/upload-artifact@v4
        with:
          name: wgtray-darwin-arm64
          path: wgtray-darwin-arm64

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - name: Install systray dependencies
        run: sudo apt-get update && sudo apt-get install -y libayatana-appindicator3-dev
      - name: Build Linux amd64
        run: CGO_ENABLED=1 go build -ldflags="-s -w" -o wgtray-linux-amd64 .
      - uses: actions/upload-artifact@v4
        with:
          name: wgtray-linux-amd64
          path: wgtray-linux-amd64

  release:
    needs: [build-macos-amd64, build-macos-arm64, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            wgtray-darwin-amd64/wgtray-darwin-amd64
            wgtray-darwin-arm64/wgtray-darwin-arm64
            wgtray-linux-amd64/wgtray-linux-amd64
