name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - name: Install systray dependencies
        run: sudo apt-get update && sudo apt-get install -y libayatana-appindicator3-dev
      - name: Build Linux amd64
        run: CGO_ENABLED=1 go build -ldflags="-s -w" -o wgtray-linux-amd64 .
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: wgtray-linux-amd64

  build-macos:
    runs-on: macos-latest   # macos-14 (arm64); cross-compiles Intel via CGo -arch flags
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - name: Install create-dmg
        run: brew install create-dmg
      - name: Build and package (Universal + Intel + ARM DMGs)
        run: make release
      - name: Upload DMGs to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/WGTray.dmg
            dist/WGTray-intel.dmg
            dist/WGTray-arm.dmg
